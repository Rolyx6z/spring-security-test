<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登録画面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
</head>
<body>
<div class="container">
    <div class="wrapper">
        <form th:action="@{/register}" th:object="${accountForm}" method="post" class="form-signin">
            <h3 class="form-signin-heading">Register!!</h3>
            <hr class="colorgraph">
            <br>
            <div th:if="${errorMessage}">
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${errorMessage}"></span>
                </div>
            </div>
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small"></p>
            <input type="text" name="username" placeholder="ユーザー名" class="form-control" required />
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></p>
            <input type="password" name="password" placeholder="パスワード" class="form-control" required />
            <button class="btn form-control btn-outline-primary" name="Submit" value="Login" type="Submit">登録</button>
            <p></p>
        </form>
    </div>
    <a class="btn btn-primary" th:href="@{/register}" role="button">Link</a>
</div>
</body>
</html>
